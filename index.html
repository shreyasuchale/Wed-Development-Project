<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Parent Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .login-section {
            padding: 60px 40px;
            text-align: center;
        }

        .login-section h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .login-section p {
            color: #666;
            margin-bottom: 40px;
        }

        .login-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .form-group input:focus {
            border-color: #667eea;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #5a67d8;
        }

        .dashboard {
            display: none;
            padding: 40px;
        }

        .dashboard h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .logout-btn {
            margin-top: 30px;
            background: crimson;
        }

        @media (max-width: 600px) {
            .login-section,
            .dashboard {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Login Section -->
    <div class="login-section" id="loginSection">
        <h1>Student Parent Portal</h1>
        <p>Login to view student academic details</p>

        <div class="login-form">
            <div class="form-group">
                <label>Parent Name</label>
                <input type="text" id="username" placeholder="Enter Name">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password">
            </div>

            <div class="form-group">
                <input type="checkbox" onclick="showPassword()"> Show Password
            </div>

            <button class="btn" onclick="login()">Login</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <h2>Welcome Parent</h2>

        <div class="card-container">
            <div class="card">
                <h3>Attendance</h3>
                <p>92%</p>
            </div>

            <div class="card">
                <h3>Marks</h3>
                <p>85%</p>
            </div>

            <div class="card">
                <h3>Fees Status</h3>
                <p>Paid</p>
            </div>

            <div class="card">
                <h3>Notices</h3>
                <p>Exam starts from Monday</p>
            </div>
        </div>

        <button class="btn logout-btn" onclick="logout()">Logout</button>
    </div>

</div>

<script>
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        if(username === 'parent' && password === '1234') {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else {
            alert('Invalid Username or Password');
        }
    }

    function showPassword() {
        const passwordField = document.getElementById('password');

        if(passwordField.type === 'password') {
            passwordField.type = 'text';
        } else {
            passwordField.type = 'password';
        }
    }

    function logout() {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('loginSection').style.display = 'block';
    }
</script>

</body>
</html>
