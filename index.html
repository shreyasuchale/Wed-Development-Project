<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Student Parent Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5f72ff,#9b23ea);
}

.container{
    width:90%;
    max-width:450px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#5f72ff;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    transition:0.3s;
}

input:focus{
    border-color:#5f72ff;
    outline:none;
}

.password-box{
    position:relative;
}

.password-box span{
    position:absolute;
    right:15px;
    top:15px;
    cursor:pointer;
    font-size:14px;
    color:#5f72ff;
    font-weight:bold;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#5f72ff,#9b23ea);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.register{
    text-align:center;
    margin-top:20px;
    color:#666;
}

.register a{
    color:#5f72ff;
    text-decoration:none;
    font-weight:bold;
}

.message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

.dashboard{
    display:none;
    text-align:center;
}

.dashboard h2{
    color:#5f72ff;
    margin-bottom:20px;
}

.card{
    background:#f3f4ff;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    font-size:18px;
}

.logout{
    margin-top:20px;
    background:red;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGIN FORM -->

    <div id="loginPage">

        <h1>Student Parent Portal</h1>

        <p class="subtitle">
            Access your child's academic information
        </p>

        <div class="input-group">
            <label>Parent Name</label>
            <input type="text" id="name" placeholder="Enter your full name">
        </div>

        <div class="input-group">
            <label>Password</label>

            <div class="password-box">
                <input type="password" id="password" placeholder="Enter password">
                <span onclick="togglePassword()">Show</span>
            </div>
        </div>

        <button onclick="login()">Login</button>

        <div class="message" id="message"></div>

        <div class="register">
            Don't have an account?
            <a href="#">Register here</a>
        </div>

    </div>



    <!-- DASHBOARD -->

    <div class="dashboard" id="dashboard">

        <h2>Welcome Parent</h2>

        <div class="card">
            👨 Student Name : Rahul Sharma
        </div>

        <div class="card">
            📚 Attendance : 92%
        </div>

        <div class="card">
            📝 Marks : 85%
        </div>

        <div class="card">
            💰 Fees Status : Paid
        </div>

        <div class="card">
            📢 Notice : Parent Meeting on Friday
        </div>

        <button class="logout" onclick="logout()">
            Logout
        </button>

    </div>

</div>

<script>

function togglePassword(){

    let pass = document.getElementById("password");

    if(pass.type === "password"){
        pass.type = "text";
    }
    else{
        pass.type = "password";
    }
}

function login(){

    let name = document.getElementById("name").value;
    let password = document.getElementById("password").value;
    let message = document.getElementById("message");

    if(name === "" || password === ""){

        message.style.color = "red";
        message.innerHTML = "Please fill all fields";

    }
    else if(password === "1234"){

        message.style.color = "green";
        message.innerHTML = "Login Successful";

        setTimeout(() => {

            document.getElementById("loginPage").style.display = "none";
            document.getElementById("dashboard").style.display = "block";

        },1000);

    }
    else{

        message.style.color = "red";
        message.innerHTML = "Invalid Password";

    }
}

function logout(){

    document.getElementById("dashboard").style.display = "none";
    document.getElementById("loginPage").style.display = "block";

}

</script>

</body>
</html>
